<head>

    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">← Back</a>
            <nav class="nav">
                <a href="Talks/index.html" class="nav-link">Talk</a>

            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main">
        <article class="about-content">
            <h1 class="about-title">About Me</h1>
            
            <section class="about-section">
                <h2>关于我</h2>

                <h2>联系我</h2>
                <p>GitHub: <a href="https://github.com/wenwen5">wenwen5</a></p>
                <p>Email: 251840026@smail.nju.edu.cn</p>
            </section>

            <section class="about-section">
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 40px;">
                    间歇性随机焦虑中。
                </p>
            </section>
        </article>
    </main>

    <footer class="footer">
        <p>wenwen5 &copy; 2026</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });

        function updateThemeIcon(theme) {
            const sun = document.querySelector('.icon-sun');
            const moon = document.querySelector('.icon-moon');
            if (theme === 'dark') {
                sun.style.display = 'block';
                moon.style.display = 'none';
            } else {
                sun.style.display = 'none';
                moon.style.display = 'block';
            }
        }
    </script>
</body>
</html>
