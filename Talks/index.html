<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk - wenwen5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="talk.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">wenwen5</a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Talk</a>
                <a href="../Articles/articles.html" class="nav-link">Articles</a>
            </nav>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main talk-main">
        <div class="talk-container">
            <aside class="talk-sidebar">
                <nav class="talk-nav" id="yearNav">
                    <a href="#" class="talk-year" data-year="2026">2026</a>
                    <a href="#" class="talk-year" data-year="2025">2025</a>
                    <a href="#" class="talk-year" data-year="2024">2024</a>
                    <a href="#" class="talk-year" data-year="2023">2023</a>
                </nav>
            </aside>

            <div class="talk-content">
                <div class="talk-header">
                    <h1 class="talk-title">Talk</h1>
                    <p class="talk-subtitle">碎碎念，日常记录</p>
                </div>

                <div class="talk-entries" id="talkEntries">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>wenwen5 &copy; 2026</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        });

        function updateThemeIcon(theme) {
            const sun = document.querySelector('.icon-sun');
            const moon = document.querySelector('.icon-moon');
            if (theme === 'dark') {
                sun.style.display = 'block';
                moon.style.display = 'none';
            } else {
                sun.style.display = 'none';
                moon.style.display = 'block';
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        let currentYear = urlParams.get('year') || '2026';

        async function loadTalks(year) {
            const container = document.getElementById('talkEntries');
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`data/${year}.json`);
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                
                document.querySelectorAll('.talk-year').forEach(el => {
                    el.classList.toggle('active', el.dataset.year === year);
                });
                
                if (data.entries.length === 0) {
                    container.innerHTML = '<p class="empty">暂无记录</p>';
                    return;
                }
                
                container.innerHTML = data.entries.map(entry => `
                    <div class="talk-entry">
                        <div class="talk-entry-time">▷ ${entry.time}</div>
                        <div class="talk-entry-content">${entry.content}</div>
                    </div>
                `).join('');
                
            } catch (e) {
                container.innerHTML = '<p class="error">加载失败</p>';
                console.error(e);
            }
        }

        document.getElementById('yearNav').addEventListener('click', (e) => {
            if (e.target.classList.contains('talk-year')) {
                e.preventDefault();
                const year = e.target.dataset.year;
                currentYear = year;
                loadTalks(year);
                history.pushState({}, '', `?year=${year}`);
            }
        });

        loadTalks(currentYear);
    </script>
</body>
</html>
